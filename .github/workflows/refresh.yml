name: Refresh IPTV Playlist

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 */2 * * *"   # every 2 hours
  workflow_dispatch:          # manual run button in GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write         # needed to push to the release branch
    env:
      BRANCH: release         # orphan branch that holds only canberra.m3u8

    steps:
      - uses: actions/checkout@v4

      - name: Filter playlist
        run: python3 filter.py

      - name: Publish to ${{ env.BRANCH }} branch (only if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            git fetch --depth 1 origin "$BRANCH"
            # Byte-compare both files; bail out only if both are identical.
            m3u_same=true; epg_same=true
            git show FETCH_HEAD:canberra.m3u8 2>/dev/null | cmp -s - canberra.m3u8 || m3u_same=false
            git show FETCH_HEAD:epg.xml.gz    2>/dev/null | cmp -s - epg.xml.gz    || epg_same=false
            if $m3u_same && $epg_same; then
              echo "No changes — $BRANCH already up to date."
              exit 0
            fi
            git worktree add --detach pub FETCH_HEAD
          else
            # First publish: start an orphan branch with no history from main.
            git worktree add --detach pub HEAD
            git -C pub checkout --orphan "$BRANCH"
            git -C pub rm -rf . >/dev/null 2>&1 || true
          fi

          cp canberra.m3u8 pub/canberra.m3u8
          cp epg.xml.gz   pub/epg.xml.gz
          git -C pub add canberra.m3u8 epg.xml.gz
          git -C pub commit -m "playlist: refresh $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git -C pub push origin "HEAD:$BRANCH"
          echo "Published to $BRANCH."
